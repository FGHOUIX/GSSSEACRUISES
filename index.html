<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GSS Adventure — Explore the Ship</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: Segoe UI, sans-serif;
  color: white;
}

/* UI */
#hero {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 5;
}

#deckPlan, #cabinView {
  position: absolute;
  inset: 0;
  background: #0a1a2a;
  display: none;
  z-index: 20;
}

.deck {
  position: absolute;
  background: #1e3a5f;
  border: 2px solid #fff;
  cursor: pointer;
}

.deck:hover { background: #2f6fb3; }

.label {
  position: absolute;
  color: #fff;
  font-size: 12px;
}

/* CABIN VIEW */
#cabinView img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#closeBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: red;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="hero">
  <h1>GSS ADVENTURE</h1>
  <h2>Explore the Ship</h2>
</div>

<div id="deckPlan">
  <h2 style="padding:20px;">Deck 12 — Deluxe Ocean View</h2>

  <!-- CABINS -->
  <div class="deck" style="top:120px; left:100px; width:80px; height:40px;"
       onclick="openCabin('12001')">12001</div>
  <div class="deck" style="top:120px; left:200px; width:80px; height:40px;"
       onclick="openCabin('12002')">12002</div>

  <!-- ELEVATOR -->
  <div class="label" style="top:200px; left:140px;">🛗 Elevator</div>

  <!-- STAIRS -->
  <div class="label" style="top:260px; left:140px;">🪜 Stairs</div>

  <!-- EXIT -->
  <div class="label" style="top:320px; left:140px;">🚪 Emergency Exit</div>
</div>

<div id="cabinView">
  <div id="closeBtn" onclick="closeCabin()">CLOSE</div>
  <img src="assets/deck12-deluxe.jpg" alt="Deluxe Ocean View">
</div>

<script>
/* THREE SETUP */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 60, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 20, 50);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(50, 80, 40);
scene.add(sun);

/* OCEAN */
const ocean = new THREE.Mesh(
  new THREE.PlaneGeometry(600,600),
  new THREE.MeshPhongMaterial({color:0x001f3f})
);
ocean.rotation.x = -Math.PI/2;
ocean.position.y = -6;
scene.add(ocean);

/* SHIP */
const ship = new THREE.Group();
scene.add(ship);

/* HULL */
ship.add(new THREE.Mesh(
  new THREE.BoxGeometry(60,10,18),
  new THREE.MeshStandardMaterial({color:0xffffff})
));

/* NOSE */
const bow = new THREE.Mesh(
  new THREE.ConeGeometry(9,18,4),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
bow.rotation.z = Math.PI/2;
bow.position.x = -30;
ship.add(bow);

/* FUNNELS */
for(let i=0;i<4;i++){
  const f = new THREE.Mesh(
    new THREE.CylinderGeometry(2,2.5,10,16),
    new THREE.MeshStandardMaterial({color:0xaa0000})
  );
  f.position.set(-10+i*8,25,0);
  ship.add(f);
}

/* CLICK DECK 12 */
window.addEventListener('keydown', e=>{
  if(e.key === '1'){ openDeck(); }
});

function openDeck(){
  document.getElementById('deckPlan').style.display = 'block';
}

function openCabin(num){
  document.getElementById('deckPlan').style.display = 'none';
  document.getElementById('cabinView').style.display = 'block';
}

function closeCabin(){
  document.getElementById('cabinView').style.display = 'none';
}

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  ship.rotation.y += 0.0007;
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
