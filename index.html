<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSS Cruises</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<style>
:root{
  --blue:#1e88e5;
  --gold:#ffcc00;
  --bg:#f4f7fb;
}

*{box-sizing:border-box;font-family:Segoe UI,system-ui}
body{margin:0;background:linear-gradient(#e3f2fd,#fff);color:#123}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
#loginBox{
  background:#fff;
  padding:30px;
  width:340px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  text-align:center;
}
#loginBox h1{color:var(--blue)}
#loginBox input,#loginBox button{
  width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;
}
#loginBox button{
  background:#000;color:#fff;font-weight:bold;cursor:pointer;
}

/* APP */
#app{display:none;height:100vh}

/* NAV */
nav{
  height:60px;background:#fff;display:flex;align-items:center;
  padding:0 20px;box-shadow:0 4px 12px rgba(0,0,0,.1)
}
nav h1{margin:0;color:var(--blue)}
nav .links{margin-left:auto}
nav .links span{margin-left:20px;cursor:pointer;font-weight:bold}

/* MAIN */
#main{
  display:grid;
  grid-template-columns:420px 1fr;
  height:calc(100vh - 60px);
}

/* LEFT */
#left{
  background:var(--bg);
  padding:14px;
  overflow:auto;
}
.card{
  background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.08)
}

/* RIGHT */
#right{position:relative}
canvas{width:100%;height:100%}
#shipLabel{
  position:absolute;top:20px;left:20px;
  background:rgba(255,255,255,.85);
  padding:10px 16px;border-radius:12px;font-weight:bold
}

/* BLUEPRINT */
#blueprint{
  width:100%;height:520px;
  background:
    repeating-linear-gradient(0deg,#ddd 0,#ddd 1px,transparent 1px,transparent 20px),
    repeating-linear-gradient(90deg,#ddd 0,#ddd 1px,transparent 1px,transparent 20px);
  border-radius:12px;
}

/* AI */
#ai{
  position:fixed;right:20px;bottom:20px;width:300px;
  background:#fff;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.2)
}
#ai header{background:var(--blue);color:#fff;padding:10px;border-radius:16px 16px 0 0}
#aiMessages{height:200px;overflow:auto;padding:10px;font-size:14px}
#ai input{width:100%;padding:10px;border:none;border-top:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h1>GSS Cruises</h1>
    <p>Sign in with email</p>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <small>Apple-style secure sign-in (demo)</small>
  </div>
</div>

<!-- APP -->
<div id="app">
<nav>
  <h1>🚢 GSS</h1>
  <div class="links">
    <span>Home</span>
    <span>Book</span>
    <span>Explore</span>
    <span>Shop</span>
    <span>More ☰</span>
  </div>
</nav>

<div id="main">

<!-- LEFT -->
<div id="left">

<div class="card">
<h3>Booking</h3>

<select><option>🇺🇸 Miami</option><option>🇪🇸 Barcelona</option><option>🇸🇬 Singapore</option></select>
<select><option>🇦🇺 Sydney</option><option>🇳🇿 Auckland</option><option>🇦🇪 Dubai</option></select>

<select>
<option>GSS Adventure</option>
<option>Ocean Cutter</option>
<option>Magic Ahoy!</option>
<option>Sea Explorer</option>
<option>Electric Kangaroo</option>
<option>City High</option>
<option>Magic Stitch</option>
<option>Island Seal</option>
<option>Gold GSS Explorer</option>
<option>GSS Zebra</option>
<option>The Motion Killer</option>
<option>Fun Ahoy</option>
<option>Bon Voyage Explorer</option>
<option>GSS Kids Only</option>
</select>

<input type="date">
<select><option>1 Passenger</option><option>2 Passengers</option><option>3 Passengers</option><option>4 Passengers</option><option>5 Passengers</option></select>

<label>Deck</label>
<input type="range" min="1" max="24" value="12" oninput="drawBlueprint(this.value)">
</div>

<div class="card">
<h3>Deck Blueprint</h3>
<svg id="blueprint" viewBox="0 0 400 800"></svg>
</div>

</div>

<!-- RIGHT -->
<div id="right">
  <div id="shipLabel">GSS Adventure</div>
</div>

</div>
</div>

<!-- AI -->
<div id="ai">
<header>🤖 GSS AI Planner</header>
<div id="aiMessages"><div>Hello! Ask me about GSS cruises ✨</div></div>
<input placeholder="Ask GSS AI…" onkeydown="if(event.key==='Enter')aiAsk(this.value),this.value=''">
</div>

<script>
/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* BLUEPRINT */
const svg=document.getElementById("blueprint");
function drawBlueprint(deck=12){
  svg.innerHTML="";
  rect(180,0,40,800,"#cfd8dc");
  let n=1;
  for(let y=20;y<760;y+=70){
    cabin(60,y,deck,n++);
    cabin(260,y,deck,n++);
  }
  label(185,40,"🛗");label(185,120,"🪜");label(185,200,"🚻");label(185,280,"🚪");
}
function cabin(x,y,d,n){
  const id=String(d).padStart(2,"0")+"01"+String(n).padStart(2,"0");
  rect(x,y,100,50,"#81c784",()=>alert("Booked cabin "+id));
  text(x+6,y+30,id);
}
function rect(x,y,w,h,c,click){
  const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
  r.setAttribute("x",x);r.setAttribute("y",y);
  r.setAttribute("width",w);r.setAttribute("height",h);
  r.setAttribute("rx",8);r.setAttribute("fill",c);
  if(click){r.style.cursor="pointer";r.onclick=click}
  svg.appendChild(r);
}
function text(x,y,t){
  const tx=document.createElementNS("http://www.w3.org/2000/svg","text");
  tx.setAttribute("x",x);tx.setAttribute("y",y);
  tx.setAttribute("font-size","12");tx.textContent=t;
  svg.appendChild(tx);
}
function label(x,y,t){
  const l=document.createElementNS("http://www.w3.org/2000/svg","text");
  l.setAttribute("x",x);l.setAttribute("y",y);
  l.textContent=t;svg.appendChild(l);
}
drawBlueprint();

/* 3D */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,18,55);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth-420,window.innerHeight-60);
document.getElementById("right").appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,.8));
const ship=new THREE.Mesh(new THREE.BoxGeometry(60,10,18),new THREE.MeshStandardMaterial({color:0xffffff}));
scene.add(ship);
function animate(){requestAnimationFrame(animate);ship.rotation.y+=0.001;renderer.render(scene,camera)}
animate();

/* AI */
function aiAsk(q){
  const box=document.getElementById("aiMessages");
  box.innerHTML+=`<div><b>You:</b> ${q}</div>`;
  let r="I can help plan cruises, ships, decks, cabins, and GSS airlines ✨";
  if(q.toLowerCase().includes("ship")) r="We have 14 amazing GSS ships available!";
  if(q.toLowerCase().includes("port")) r="GSS sails from Miami, Barcelona, Singapore, Sydney, Auckland & more!";
  box.innerHTML+=`<div><b>GSS AI:</b> ${r}</div>`;
  box.scrollTop=box.scrollHeight;
}
</script>

</body>
</html>
